spring:
  application:
    name: USER-SERVICE
  datasource:
    url: jdbc:h2:mem:user_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 587
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  config:
    import: "optional:configserver:http://localhost:8888" # Optional configserver
  cloud:
    config:
      enabled: false # Disable config server for tests
    discovery:
      enabled: false # Disable Eureka for tests

jwt:
  secret: test-secret-key-12345678901234567890123456789012
